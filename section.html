<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作品详情 — TOY LAB OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body class="section-page">

  <nav class="main-nav" aria-label="主导航">
    <a href="index.html" class="nav-btn">首页 / HOME</a>
    <a href="about.html" class="nav-btn">关于 / ABOUT</a>
  </nav>

  <div class="sub-page page-enter">
    <a href="index.html" class="back-link">← 返回桌面</a>

    <h1 id="section-title">—</h1>

    <div class="section-hero" id="section-hero"></div>

    <dl class="section-meta">
      <div>
        <dt>TYPE</dt>
        <dd id="meta-type">—</dd>
      </div>
      <div>
        <dt>DATE</dt>
        <dd id="meta-date">—</dd>
      </div>
      <div>
        <dt>TOOLS</dt>
        <dd id="meta-tools">—</dd>
      </div>
    </dl>

    <div id="section-desc">
      <p>这里是一段关于该板块的介绍文字。你可以在这里写下这个板块包含的内容、目标和特色。</p>
    </div>
  </div>

  <script>
    const sections = {
      easel: {
        title: '油画架 / EASEL STUDY',
        type: 'VISUAL DESIGN',
        date: '2026',
        tools: 'ILLUSTRATION · 3D · COMPOSITION',
        image: '2.png',
        desc: '<p>以桌面油画架为视觉入口，将绘画、空间陈设与个人审美组合为一组叙事场景。点击作品后可继续补充项目过程、草图与最终成品。</p>'
      },
      sculpture: {
        title: '石膏像 / FORM STUDY',
        type: 'FORM & LIGHT STUDY',
        date: '2026',
        tools: '3D · LIGHTING · MATERIAL',
        image: '1.png',
        desc: '<p>围绕石膏像的体块、材质和暖色灯光展开造型研究，通过明暗层次强化古典雕塑与复古桌面空间之间的关系。</p>'
      },
      'art-toy': {
        title: '潮玩 / ART TOY',
        type: 'CHARACTER DESIGN',
        date: '2026',
        tools: 'CONCEPT · 3D · PRODUCT',
        image: '0.png',
        desc: '<p>绿色头套潮玩角色以夸张比例和低饱和材质建立辨识度，展示角色设定、潮玩产品语言与场景化呈现。</p>'
      }
    }

    const params = new URLSearchParams(window.location.search)
    const id = params.get('id')
    const section = sections[id]

    if (section) {
      document.title = section.title + ' — TOY LAB OS'
      document.getElementById('section-title').textContent = section.title
      document.getElementById('meta-type').textContent = section.type
      document.getElementById('meta-date').textContent = section.date
      document.getElementById('meta-tools').textContent = section.tools
      document.getElementById('section-desc').innerHTML = section.desc
      document.getElementById('section-hero').style.backgroundImage = `url("${section.image}")`
    } else {
      document.getElementById('section-title').textContent = 'NOT FOUND'
    }

    // Fade in
    document.body.style.opacity = '0'
    document.body.style.transition = 'opacity 0.5s ease'
    window.addEventListener('load', () => { document.body.style.opacity = '1' })
  </script>
</body>
</html>
