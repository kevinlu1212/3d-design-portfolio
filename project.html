<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目 — TOY LAB OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="project-page">

  <!-- Navigation -->
  <nav class="main-nav" aria-label="主导航">
    <a href="index.html" class="nav-btn">首页 / HOME</a>
    <a href="about.html" class="nav-btn">关于 / ABOUT</a>
    <a href="index.html#gallery" class="nav-btn active">作品 / GALLERY</a>
  </nav>

  <div class="sub-page page-enter">

    <a href="index.html" class="back-link">← 返回桌面</a>

    <!-- Project Title (filled by JS based on ?id= param) -->
    <h1 id="project-title">PROJECT</h1>

    <!-- Hero Image -->
    <div class="project-hero-img" id="project-hero"></div>

    <!-- Project Meta -->
    <dl class="project-meta" id="project-meta">
      <div>
        <dt>TYPE</dt>
        <dd id="meta-type">—</dd>
      </div>
      <div>
        <dt>DATE</dt>
        <dd id="meta-date">—</dd>
      </div>
      <div>
        <dt>TOOLS</dt>
        <dd id="meta-tools">—</dd>
      </div>
      <div>
        <dt>STATUS</dt>
        <dd id="meta-status">—</dd>
      </div>
    </dl>

    <!-- Project Description -->
    <div id="project-desc">
      <p>这里是一段关于项目的介绍文字。描述项目的目标、挑战和解决方案。</p>
      <p>每一个项目都是一次创意的探索，从概念到实现，每一步都充满惊喜。</p>
    </div>

  </div>

  <script>
    // ─── Project Data ──────────────────────────────────
    const projects = {
      'soft-orbit': {
        title: 'SOFT ORBIT',
        type: '3D OBJECT · VISUAL',
        date: '01 / 2026',
        tools: 'Blender · After Effects',
        status: 'Completed',
        desc: '<p>Soft Orbit 是一个探索柔软形态与轨道运动的 3D 视觉项目。通过模拟物理材质和光影效果，创造出独特的视觉体验。</p><p>这个项目挑战了传统 3D 设计的边界，尝试在数字空间中重现真实的触感和质感。</p>'
      },
      'lucky-garden': {
        title: 'LUCKY GARDEN',
        type: 'TOY · CHARACTER',
        date: '02 / 2025',
        tools: 'Blender · ZBrush',
        status: 'Completed',
        desc: '<p>Lucky Garden 是一个玩具角色设计项目，融合了东方文化元素与现代设计理念。</p><p>每个角色都有独特的个性和故事，构成了一个充满想象力的玩具世界。</p>'
      },
      'daydream': {
        title: 'DAYDREAM.EXE',
        type: '3D · BRAND WORLD',
        date: '03 / 2025',
        tools: 'Three.js · Blender',
        status: 'Completed',
        desc: '<p>Daydream.exe 是一个将梦境转化为数字体验的实验性项目。通过 WebGL 技术，创造出沉浸式的 3D 品牌世界。</p><p>项目探索了虚拟与现实的边界，让用户在数字空间中体验梦幻般的视觉旅程。</p>'
      },
      'sweet-signal': {
        title: 'SWEET SIGNAL',
        type: 'CULTURE · PACKAGING',
        date: '04 / 2024',
        tools: 'Illustrator · Blender',
        status: 'Completed',
        desc: '<p>Sweet Signal 是一个将甜品文化与信号传播概念结合的包装设计项目。</p><p>通过视觉语言传达甜蜜与连接的主题，创造出独特的品牌识别系统。</p>'
      }
    }

    // ─── Load Project Data ─────────────────────────────
    function loadProject() {
      const params = new URLSearchParams(window.location.search)
      const id = params.get('id')
      const project = projects[id]

      if (!project) {
        document.getElementById('project-title').textContent = 'PROJECT NOT FOUND'
        return
      }

      document.title = `${project.title} — TOY LAB OS`
      document.getElementById('project-title').textContent = project.title
      document.getElementById('meta-type').textContent = project.type
      document.getElementById('meta-date').textContent = project.date
      document.getElementById('meta-tools').textContent = project.tools
      document.getElementById('meta-status').textContent = project.status
      document.getElementById('project-desc').innerHTML = project.desc
    }

    // ─── Init ──────────────────────────────────────────
    loadProject()

    // Fade in
    document.body.style.opacity = '0'
    document.body.style.transition = 'opacity 0.5s ease'
    window.addEventListener('load', () => {
      document.body.style.opacity = '1'
    })
  </script>
</body>
</html>
