<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOY LAB OS — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=5" />
</head>
<body data-page="home">
  <section class="desk-scene" id="home">
    <nav class="main-nav" aria-label="主导航">
      <a href="index.html#home" class="nav-btn active" data-nav="home">首页 / HOME</a>
      <a href="index.html#lanyard" class="nav-btn" data-nav="lanyard">关于我 / ABOUT ME</a>
      <a href="about.html" class="nav-btn" data-nav="about">关于 / ABOUT</a>
      <a href="section.html?id=easel" class="nav-btn" data-nav="works">作品 / WORKS</a>
    </nav>

    <div class="desk-stage">
      <div class="desk-bg" id="desk-bg"></div>

      <div class="hotspots-layer">
        <a href="section.html?id=easel" class="hotspot object-hotspot" id="hs-easel" aria-label="查看油画架作品详情">
          <span class="object-shell">
            <img src="2.png" class="scene-object" alt="油画架作品" draggable="false" />
            <span class="object-label">油画架 / EASEL</span>
          </span>
        </a>

        <a href="section.html?id=sculpture" class="hotspot object-hotspot" id="hs-sculpture" aria-label="查看石膏像作品详情">
          <span class="object-shell">
            <img src="1.png" class="scene-object" alt="石膏像作品" draggable="false" />
            <span class="object-label">石膏像 / SCULPTURE</span>
          </span>
        </a>

        <a href="section.html?id=art-toy" class="hotspot object-hotspot" id="hs-art-toy" aria-label="查看潮玩作品详情">
          <span class="object-shell">
            <img src="0.png" class="scene-object" alt="绿色潮玩作品" draggable="false" />
            <span class="object-label">潮玩 / ART TOY</span>
          </span>
        </a>
      </div>
    </div>

    <div class="desk-hint">
      <span>点击物品或滚动页面探索 ↗</span>
    </div>
  </section>

  <section class="lanyard-section" id="lanyard" aria-labelledby="lanyard-title">
    <div class="lanyard-copy">
      <span class="lanyard-kicker">INTERACTIVE ID / 3D</span>
      <h2 id="lanyard-title">Drag the card</h2>
      <p>拖动卡片，体验实时绳索物理与惯性摆动。</p>
    </div>
    <div id="lanyard-root"></div>
  </section>
  <script src="navigation.js?v=1"></script>
  <script src="hotspots.js?v=5"></script>
  <script type="module" src="assets/lanyard-build/lanyard.js?v=4"></script>
</body>
</html>
