<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOY LAB OS — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ═══ Interactive Desk Scene ═══ -->
  <section class="desk-scene" id="home" aria-label="Interactive desk homepage">
    <!-- Full-screen background image -->
    <div class="desk-bg"></div>

    <!-- Navigation bar -->
    <nav class="main-nav" aria-label="主导航">
      <a href="#home" class="nav-btn active">首页 / HOME</a>
      <a href="about.html" class="nav-btn">关于 / ABOUT</a>
      <a href="#gallery" class="nav-btn">作品 / GALLERY</a>
    </nav>

    <!-- Clickable hotspots overlay -->
    <div class="hotspots-layer">

      <!-- 🖥️ Computer Monitor → Project Gallery -->
      <a href="#gallery" class="hotspot" id="hs-monitor" aria-label="查看作品集">
        <span class="hotspot-pulse"></span>
        <span class="hotspot-label">查看作品集 ↗</span>
      </a>

      <!-- 📋 Space Fury Poster → About Page -->
      <a href="about.html" class="hotspot" id="hs-poster" aria-label="个人介绍">
        <span class="hotspot-pulse"></span>
        <span class="hotspot-label">关于我 ↗</span>
      </a>

      <!-- 🧸 Teddy Bear → Project 1 -->
      <a href="project.html?id=soft-orbit" class="hotspot" id="hs-teddy" aria-label="Soft Orbit 项目">
        <span class="hotspot-pulse"></span>
        <span class="hotspot-label">Soft Orbit ↗</span>
      </a>

      <!-- 🦕 Dinosaur → Project 2 -->
      <a href="project.html?id=lucky-garden" class="hotspot" id="hs-dino" aria-label="Lucky Garden 项目">
        <span class="hotspot-pulse"></span>
        <span class="hotspot-label">Lucky Garden ↗</span>
      </a>

      <!-- ⭐ Star Pillow → Project 3 -->
      <a href="project.html?id=daydream" class="hotspot" id="hs-star" aria-label="Daydream.exe 项目">
        <span class="hotspot-pulse"></span>
        <span class="hotspot-label">Daydream.exe ↗</span>
      </a>

      <!-- 🧮 Calculator → Project 4 -->
      <a href="project.html?id=sweet-signal" class="hotspot" id="hs-calc" aria-label="Sweet Signal 项目">
        <span class="hotspot-pulse"></span>
        <span class="hotspot-label">Sweet Signal ↗</span>
      </a>

    </div>

    <!-- Bottom hint -->
    <div class="desk-hint">
      <span>点击桌面上的物品探索 ↗</span>
    </div>
  </section>

  <script src="hotspots.js"></script>
</body>
</html>
