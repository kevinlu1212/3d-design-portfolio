<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOY LAB OS — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="desk-scene" id="home">
    <div class="desk-bg" id="desk-bg"></div>

    <nav class="main-nav">
      <a href="#home" class="nav-btn active">首页 / HOME</a>
      <a href="about.html" class="nav-btn">关于 / ABOUT</a>
      <a href="works.html" class="nav-btn">作品 / WORKS</a> 
    </nav>

    <div class="hotspots-layer">

      <!-- 📋 Poster -->
      <a href="about.html" class="hotspot" id="hs-poster">
        <div class="toy-wrapper">
          <img src="assets/sil-poster.png" class="toy-img" alt="" draggable="false" />
          <span class="toy-label">关于我</span>
        </div>
      </a>

      <!-- 🧸 Toy 1 -->
      <a href="section.html?id=1" class="hotspot" id="hs-toy1">
        <div class="toy-wrapper">
          <img src="assets/sil-teddy.png" class="toy-img" alt="" draggable="false" />
          <span class="toy-label">泰迪熊</span>
        </div>
      </a>

      <!-- 🦕 Toy 2 -->
      <a href="section.html?id=2" class="hotspot" id="hs-toy2">
        <div class="toy-wrapper">
          <img src="assets/sil-dino.png" class="toy-img" alt="" draggable="false" />
          <span class="toy-label">小恐龙</span>
        </div>
      </a>

      <!-- ⭐ Toy 3 -->
      <a href="section.html?id=3" class="hotspot" id="hs-toy3">
        <div class="toy-wrapper">
          <img src="assets/sil-pillow.png" class="toy-img" alt="" draggable="false" />
          <span class="toy-label">星星抱枕</span>
        </div>
      </a>

      <!-- 🧮 Toy 4 -->
      <a href="section.html?id=4" class="hotspot" id="hs-toy4">
        <div class="toy-wrapper">
          <img src="assets/sil-calc.png" class="toy-img" alt="" draggable="false" />
          <span class="toy-label">计算器</span>
        </div>
      </a>

      <!-- ⚽ Toy 5 -->
      <a href="section.html?id=5" class="hotspot" id="hs-toy5">
        <div class="toy-wrapper">
          <img src="assets/sil-soccer.png" class="toy-img" alt="" draggable="false" />
          <span class="toy-label">足球</span>
        </div>
      </a>

    </div>

    <div class="desk-hint">
      <span>点击桌面上的物品探索 ↗</span>
    </div>
  </section>

  <section class="lanyard-section" id="lanyard" aria-labelledby="lanyard-title">
    <div class="lanyard-copy">
      <span class="lanyard-kicker">INTERACTIVE ID / 3D</span>
      <h2 id="lanyard-title">Drag the card</h2>
      <p>拖动卡片，体验实时绳索物理与惯性摆动。</p>
    </div>
    <div id="lanyard-root"></div>
  </section>
  <script src="hotspots.js"></script>
  <script type="module" src="assets/lanyard-build/lanyard.js"></script>
</body>
</html>
